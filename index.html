<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fashion Store</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="#">Fashion Store</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link">Cart 🛒 <span id="cart-count">0</span></a>
</li>
</ul>

</div>
</nav>


<!-- Header -->

<header class="bg-light text-center p-5">
<h1>Trendy Fashion Collection</h1>
<p>Shop the latest fashion products</p>
</header>


<!-- Product Section -->

<div class="container mt-5">

<div class="row" id="product-list">

<!-- Product 1 -->

<div class="col-md-4">
<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab" class="card-img-top">

<div class="card-body">

<h5 class="card-title">Stylish T-Shirt</h5>
<p>₹799</p>

<button class="btn btn-primary add-cart">Add to Cart</button>

</div>
</div>
</div>


<!-- Product 2 -->

<div class="col-md-4">
<div class="card">

<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246" class="card-img-top">

<div class="card-body">

<h5 class="card-title">Blue Jeans</h5>
<p>₹1499</p>

<button class="btn btn-primary add-cart">Add to Cart</button>

</div>
</div>
</div>


<!-- Product 3 -->

<div class="col-md-4">
<div class="card">

<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" class="card-img-top">

<div class="card-body">

<h5 class="card-title">Fashion Jacket</h5>
<p>₹2999</p>

<button class="btn btn-primary add-cart">Add to Cart</button>

</div>
</div>
</div>

</div>
</div>


<script src="script.js"></script>

</body>
</html>
